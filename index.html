<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menú Cafetería</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root { --primary:#7FAFA8; --bg:#f7f7f7; --card:#fff; --accent:#F4BFA6; --text:#5A5A5A; }

body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:17px;
}

.container{max-width:1100px;margin:auto;padding:20px}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#7FAFA8;
  text-align:center;
  padding:10px;
}

.logo{width:70px}

/* BOTONES */
.filters{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}

.filters button{
  padding:12px 18px;
  font-size:15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  text-align:center;
  padding:12px;
}

.card-content h3{
  font-size:18px;
}

.desc{
  font-size:14px;
  margin:5px 0;
}

.price{
  font-size:20px;
  font-weight:700;
  color:#F4BFA6;
}

/* BOTÓN PEDIR */
.order-btn{
  margin-top:8px;
  background:#25D366;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  width:100%;
  font-size:14px;
}

/* BOTONES FLOTANTES */
.floating-buttons{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.fab{
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
  cursor:pointer;
}

.scroll-top{
  background:#7FAFA8;
  opacity:0;
}

.scroll-top.show{opacity:1}

.whatsapp{
  background:#25D366;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header class="header">
  <img src="images/logo.png" class="logo">
</header>

<div class="container">
  <div class="filters">
    <button onclick="render()">Todo</button>
  </div>

  <div class="grid" id="menu"></div>
</div>

<div class="floating-buttons">
  <button class="fab scroll-top" id="scrollTopBtn">↑</button>
  <a class="fab whatsapp" href="https://wa.me/598095662193">📞</a>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT4Jlrqj7FGzviBaDj5UE15EPxPG0cqsNb8ihQ2rO3DUOFo69OioIroCADsJYXifA/pub?gid=350585094&single=true&output=csv"
let data=[];

async function loadData(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const rows = text.split("\r\n");

  data = rows.map(r=>{
    const [id,name,description,price,img,cat]=r.split(",");
    return {id,name,description,price,img,cat};
  }).filter(i=>i.id);

  render();
}

function render(){
  const menu=document.getElementById("menu");
  menu.innerHTML="";

  data.forEach(item=>{
    const msg = encodeURIComponent("Hola, quiero pedir: " + item.name);

    menu.innerHTML+=`
    <div class="card">
      <img src="${item.img || 'images/sinimagen.png'}">
      <div class="card-content">
        <h3>${item.name}</h3>
        <p class="desc">${item.description || ""}</p>
        <p class="price">$${item.price}</p>
        <a href="https://wa.me/598095662193?text=${msg}">
          <button class="order-btn">Pedir por WhatsApp</button>
        </a>
      </div>
    </div>`;
  });
}

/* Scroll */
const btn=document.getElementById("scrollTopBtn");
window.addEventListener("scroll",()=>{
  if(window.scrollY>200){btn.classList.add("show")}
  else{btn.classList.remove("show")}
});

btn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

loadData();
</script>

</body>
</html>
